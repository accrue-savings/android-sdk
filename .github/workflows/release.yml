name: Release Android SDK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: "write"
  id-token: "write"
  pull-requests: "write"
  packages: "write"

jobs:
  version:
    name: Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.next }}
      from_tag: ${{ steps.semver.outputs.current }}
      to_tag: ${{ steps.semver.outputs.next }}
      changelog: ${{ steps.changelog.outputs.changes }}
      # When false, repo files already matched NEXT_VERSION (no sed diff) — skip publish to avoid duplicate Maven/GitHub Packages release.
      should_release: ${{ steps.bump.outputs.changed }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Create github.properties
        run: |
          # Create github-read.properties for dependency resolution
          echo "gpr.usr=Github Workflow" > github-read.properties
          echo "gpr.key=${{ secrets.GITHUB_TOKEN }}" >> github-read.properties

          # Create github.properties for publishing
          echo "gpr.usr=Github Workflow" > github.properties
          echo "gpr.key=${{ secrets.GITHUB_TOKEN }}" >> github.properties

      - name: Build and Test Project
        run: |
          ./gradlew build
          ./gradlew test
        env:
          GPR_USER: ${{ github.actor }}
          GPR_API_KEY: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Next Version
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          branch: "main"
          token: ${{ github.token }}
          skipInvalidTags: true
          patchList: chore, fix, bugfix, perf, refactor, test, tests, ci
          maxTagsToFetch: 40
          majorList: ${{ github.event.inputs.version_type == 'major' && 'major' || '' }}
          minorList: ${{ github.event.inputs.version_type == 'minor' && 'minor' || '' }}
          patchAll: ${{ github.event.inputs.version_type == 'patch' && 'true' || 'false' }}

      - name: Update Package Version
        id: bump
        run: |
          set -euo pipefail
          NEXT_VERSION="${{ steps.semver.outputs.next }}"
          CURRENT_TAG="${{ steps.semver.outputs.current }}"
          echo "semver latest tag (current): ${CURRENT_TAG}"
          echo "semver calculated next release: ${NEXT_VERSION}"

          # android {} block version (first matching line — must stay before publishing {} block).
          FILE_VERSION=$(grep -m1 -E '^\s+version = "v[0-9]+\.[0-9]+\.[0-9]+"' androidsdk/build.gradle.kts | sed -E 's/.*"(v[0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          if [[ -z "${FILE_VERSION}" ]]; then
            echo "::error::Could not parse SDK version from androidsdk/build.gradle.kts (android block)."
            exit 1
          fi
          echo "version currently in androidsdk/build.gradle.kts: ${FILE_VERSION}"

          # If git tags lag GitHub Packages, semver keeps an old baseline while source is newer.
          # Applying that "next" would downgrade the repo and republish an existing artifact (409).
          NEXT_S="${NEXT_VERSION#v}"
          FILE_S="${FILE_VERSION#v}"
          if dpkg --compare-versions "${NEXT_S}" lt "${FILE_S}"; then
            echo "::error::Release version ${NEXT_VERSION} is behind the version declared in source (${FILE_VERSION})."
            echo "Push git tags on main for each version already published to GitHub Packages (e.g. v1.3.2, v1.3.3) so the latest tag matches reality, then merge or re-run this workflow."
            exit 1
          fi

          echo "Updating version files to ${NEXT_VERSION}"

          # Update androidsdk/build.gradle.kts - android block version
          sed -i '/^android {/,/^}/s/version = "v[0-9]*\.[0-9]*\.[0-9]*"/version = "'"${NEXT_VERSION}"'"/' androidsdk/build.gradle.kts

          # Update androidsdk/build.gradle.kts - MavenPublication version
          sed -i '/register<MavenPublication>/,/}/s/version = "v[0-9]*\.[0-9]*\.[0-9]*"/version = "'"${NEXT_VERSION}"'"/' androidsdk/build.gradle.kts

          # Update AccrueContextData.kt - sdkVersion
          sed -i "s/sdkVersion: String? = \"v[0-9]*\.[0-9]*\.[0-9]*\"/sdkVersion: String? = \"${NEXT_VERSION}\"/" androidsdk/src/main/java/com/accruesavings/androidsdk/AccrueContextData.kt

          # Commit only when sed actually changed files (avoid git commit failing on clean tree).
          # If nothing changed, repo already matches NEXT_VERSION — do not publish (avoids duplicate package for v1.3.1 etc.).
          git config --global user.name "Github Workflow"
          git config --global user.email "githubworkflow@accruemoney.com"
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version file changes; repo already at ${NEXT_VERSION}. Skipping commit, push, and publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git commit -m "build: updating package version to ${NEXT_VERSION} [skip ci]"
            git push origin main
          fi
          sleep 10

      - name: Publish Package
        if: steps.bump.outputs.changed == 'true'
        run: ./gradlew publish
        env:
          GPR_USER: ${{ github.actor }}
          GPR_API_KEY: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pre-release
        if: steps.bump.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.next }}
          generate_release_notes: true
          prerelease: true
          make_latest: false
          target_commitish: "main"

      - name: Update CHANGELOG
        id: changelog
        if: steps.bump.outputs.changed == 'true'
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          fromTag: ${{ steps.semver.outputs.next }}
          toTag: ${{ steps.semver.outputs.current }}
          writeToFile: false
          includeRefIssues: false

  create-release:
    name: create-release
    if: needs.version.outputs.should_release == 'true'
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          body: ${{ needs.version.outputs.changelog }}
          prerelease: false
          make_latest: true
